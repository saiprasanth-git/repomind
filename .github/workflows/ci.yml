name: CI — Test & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend · pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repomind_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/repomind_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/repomind_test
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'test-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-key' }}
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: backend/.pytest_cache/

  # ── Backend Lint ─────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: |
          cd backend
          ruff check app/ --select=E,F,W --ignore=E501,W291 || true
          # Non-blocking for now — will enforce after initial setup

  # ── Frontend Build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/public/
          retention-days: 7

  # ── Frontend Type Check ──────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend · TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit || true
        # Non-blocking: catches type errors without failing CI on strict issues

  # ── Summary ──────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Backend tests: ${{ needs.backend-test.result }}"
          echo "Frontend build: ${{ needs.frontend-build.result }}"
          if [[ "${{ needs.backend-test.result }}" == "failure" || "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi
